<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Video Content — Director, Cinematographer, Producer">
<title>Video Content | Director, Cinematographer, Producer</title>

<style>
/* ─── Fonts ─────────────────────────────────────────────────── */
@font-face { font-family:'Editorialnew'; font-weight:200; font-style:normal; font-display:swap; src:url('assets/editorialnew-ultralight.woff2') format('woff2'); }
@font-face { font-family:'Editorialnew'; font-weight:400; font-style:normal; font-display:swap; src:url('assets/editorialnew-regular.woff2') format('woff2'); }
@font-face { font-family:'EditorialnewItalic'; font-weight:200; font-style:italic; font-display:swap; src:url('assets/editorialnew-italic.woff2') format('woff2'); }
@font-face { font-family:'EditorialnewItalic'; font-weight:400; font-style:italic; font-display:swap; src:url('assets/editorialnewitalic-regular.woff2') format('woff2'); }
@font-face { font-family:'Monumentgrotesk'; font-weight:400; font-style:normal; font-display:swap; src:url('assets/monumentgrotesk-regular.woff2') format('woff2'); }
@font-face { font-family:'Monumentgrotesk'; font-weight:500; font-style:normal; font-display:swap; src:url('assets/monumentgrotesk-medium.woff2') format('woff2'); }
@font-face { font-family:'MonumentgroteskMono'; font-weight:400; font-style:normal; font-display:swap; src:url('assets/monumentgrotesk-mono.woff2') format('woff2'); }
@font-face { font-family:'Abcsimonmono'; font-weight:400; font-style:normal; font-display:swap; src:url('assets/abcsimonmono-regular.woff2') format('woff2'); }

/* ─── Tokens ────────────────────────────────────────────────── */
:root {
  --bg: #1e1e1c;
  --bg2: #232422;
  --bg3: #30302d;
  --lemon: #ffeec8;
  --light: #fffbf2;
  --grey: #bdbab3;
  --dim: rgba(255,238,200,0.5);
  --dimmer: rgba(255,238,200,0.3);
  --faint: rgba(255,238,200,0.08);
  --faint2: rgba(255,238,200,0.04);
  --serif: 'Editorialnew', Arial, sans-serif;
  --serif-i: 'EditorialnewItalic', Arial, sans-serif;
  --sans: 'Monumentgrotesk', Arial, sans-serif;
  --mono: 'MonumentgroteskMono', monospace;
  --mono2: 'Abcsimonmono', monospace;
  --ease: cubic-bezier(0.75, 0, 0, 1);
}

/* ─── Reset ─────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-text-size-adjust:100%;height:100%}
body{background:var(--bg);color:var(--lemon);font-family:var(--sans);font-weight:400;line-height:1;overflow:hidden;height:100%;cursor:none}
a{color:inherit;text-decoration:none}
img,video{display:block;max-width:100%}
button{background:none;border:none;cursor:none;color:inherit;font:inherit}
::selection{color:var(--bg);background:var(--lemon)}

/* ─── Custom Cursor ─────────────────────────────────────────── */
.cursor{position:fixed;top:0;left:0;width:10px;height:10px;border-radius:50%;background:var(--lemon);pointer-events:none;z-index:99999;transform:translate(-50%,-50%);transition:width .25s var(--ease),height .25s var(--ease),opacity .3s;mix-blend-mode:difference}
.cursor.is--big{width:40px;height:40px}
.cursor.is--hidden{opacity:0}

/* ─── Preloader ─────────────────────────────────────────────── */
.preloader{position:fixed;inset:0;z-index:50000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2.5rem;transition:opacity .8s var(--ease)}
.preloader.is--done{opacity:0;pointer-events:none}
.preloader-text{font-family:var(--serif);font-weight:200;font-size:clamp(1.2rem,2.2vw,2rem);color:var(--lemon);letter-spacing:-0.02em;text-align:center;line-height:1.3;overflow:hidden}
.preloader-text .word{display:inline-block;transform:translateY(110%);transition:transform .7s var(--ease)}
.preloader-text.is--reveal .word{transform:translateY(0)}
.preloader-counter{font-family:var(--mono);font-size:clamp(0.6rem,0.8vw,0.8rem);color:var(--dimmer);letter-spacing:0.15em;height:1.2em;overflow:hidden;position:relative}
.preloader-counter-inner{transition:transform .3s var(--ease)}
.preloader-name{font-family:var(--serif);font-weight:200;font-size:clamp(2.5rem,7vw,6rem);color:var(--lemon);letter-spacing:-0.03em;opacity:0;transform:translateY(20px);transition:opacity .6s,transform .6s var(--ease)}
.preloader-name.is--reveal{opacity:1;transform:translateY(0)}

/* Preloader corner thumbnails */
.preloader-corner{position:fixed;z-index:50001;overflow:hidden;opacity:0;transition:opacity .3s ease-out}
.preloader-corner img{width:100%;height:100%;object-fit:cover}
.preloader-corner.is--tl{top:0;left:0;width:200px;height:130px}
.preloader-corner.is--tr{top:0;right:0;width:200px;height:130px}
.preloader-corner.is--bl{bottom:0;left:0;width:200px;height:130px}
.preloader-corner.is--br{bottom:0;right:0;width:200px;height:130px}
.preloader-corner.is--flash{opacity:1}

/* ─── Film Ruler Decor ──────────────────────────────────────── */
.decor-rulers{position:fixed;inset:0;z-index:10005;pointer-events:none;display:flex;justify-content:space-between;padding:0 6px}
.decor-ruler{width:8px;height:100%;overflow:hidden;writing-mode:sideways-lr}
.decor-ruler-text{font-family:var(--mono);font-size:7px;color:rgba(255,238,200,0.15);white-space:nowrap;animation:rulerScroll 80s linear infinite}
.decor-ruler.is--right{direction:rtl}
@keyframes rulerScroll{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}

/* ─── Navbar ────────────────────────────────────────────────── */
.navbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:auto;padding:29px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;background:transparent}
.nav-logo{font-family:var(--serif);font-weight:200;font-size:clamp(1.1rem,1.4vw,1.6rem);letter-spacing:-0.01em;display:flex;align-items:baseline;cursor:none;position:relative}
.nav-logo .il{font-family:var(--serif-i);font-style:italic}
.nav-logo .char-wrap{position:relative;display:inline-block}
.nav-logo .char-dup{position:absolute;left:0;top:0;opacity:0;transform:translateY(-100%);transition:transform .4s var(--ease),opacity .3s}
.nav-logo:hover .char-dup{opacity:1;transform:translateY(0)}
.nav-logo:hover .char-main{transform:translateY(100%);opacity:0}
.nav-logo .char-main{transition:transform .4s var(--ease),opacity .3s;display:inline-block}
.nav-center{display:flex;align-items:center;gap:0.4rem;font-family:var(--sans);font-size:10.944px;letter-spacing:0.05em;text-transform:uppercase;position:absolute;left:256px;top:29px}
.nav-creative-dot{width:5px;height:5px;border-radius:50%;background:var(--lemon)}
.nav-creative-text{color:var(--dimmer);font-weight:400;font-size:inherit;letter-spacing:inherit}
.nav-view-btn{color:var(--dimmer);cursor:none;transition:color .3s;font-weight:500;font-size:inherit;letter-spacing:inherit;text-transform:inherit;font-family:inherit}
.nav-view-btn.is--active{color:var(--lemon)}
.nav-view-btn:hover{color:var(--lemon)}
.nav-right-block{display:flex;align-items:flex-start;gap:4.8rem}
.nav-col{display:flex;flex-direction:column;align-items:flex-start;gap:2px;position:relative}
.nav-dot-active{width:4px;height:4px;border-radius:50%;background:var(--lemon);position:absolute;left:-10px;top:4px}
.nav-link-top{font-family:var(--sans);font-weight:500;font-size:10.944px;letter-spacing:0.03em;text-transform:uppercase;color:rgba(255,251,242,0.7);cursor:none;transition:color .3s}
.nav-link-top.is--active{color:var(--lemon)}
.nav-link-top.is--bold{font-weight:500}
.nav-link-top:hover{color:var(--lemon)}
.nav-contact{align-self:flex-start}
@media(max-width:767px){.nav-link-top{display:none}.nav-col{display:none}}

/* ─── Nav Menu Overlay ──────────────────────────────────────── */
.nav-menu{position:fixed;inset:0;z-index:9998;background:var(--bg);display:flex;flex-direction:column;justify-content:center;padding:0 8vw;opacity:0;pointer-events:none;transition:opacity .5s var(--ease)}
.nav-menu.is--open{opacity:1;pointer-events:all}
.nav-menu-link{font-family:var(--serif);font-weight:200;font-size:clamp(2rem,5vw,5rem);letter-spacing:-0.02em;line-height:1.2;color:var(--dimmer);transition:color .3s;cursor:none;display:block;margin-bottom:0.5rem}
.nav-menu-link:hover{color:var(--lemon)}
.nav-menu-link .num{font-family:var(--mono);font-size:0.35em;vertical-align:super;opacity:0.5;margin-right:0.3em}
.nav-menu-link .il{font-family:var(--serif-i);font-style:italic}

/* ─── Background Block ──────────────────────────────────────── */
.bg-block{position:fixed;inset:0;z-index:1;overflow:hidden;background:var(--bg)}
.bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .6s}
.bg-video.is--active{opacity:1}

/* ─── Main Container ────────────────────────────────────────── */
.page-main{position:relative;z-index:2;height:100vh;overflow:hidden}

/* ─── Slider View (GSAP Observer) ───────────────────────────── */
.slider-view{position:absolute;inset:0;z-index:2}
.slider-view.is--hidden{display:none}

/* Individual slide */
.slide{position:absolute;inset:0;opacity:0;pointer-events:none;z-index:1}
.slide.is--active{opacity:1;pointer-events:all;z-index:2}

/* Slide content — 3-column grid matching original */
.slide-content{position:absolute;inset:0;display:grid;grid-template-columns:1fr 34.3% 1fr;grid-template-rows:100%;align-items:center;justify-content:center;z-index:5;padding:0;gap:2px}

/* Name columns — 95px split title */
.slide-name-left{font-family:var(--serif);font-weight:200;font-size:clamp(2.2rem,6.6vw,5.94rem);line-height:1.06;letter-spacing:-0.02em;text-align:right;color:var(--lemon);align-self:center;padding:0}
.slide-name-right{font-family:var(--serif);font-weight:200;font-size:clamp(2.2rem,6.6vw,5.94rem);line-height:1.06;letter-spacing:-0.02em;text-align:left;color:var(--lemon);align-self:center;padding:0}
.slide-name-left .il,.slide-name-right .il{font-family:var(--serif-i);font-style:italic}

/* Center column — info + play */
.slide-center{display:flex;flex-direction:column;justify-content:space-between;align-items:stretch;height:40vh;align-self:center}

/* Video preview box in center — transparent zone, bg video shows through */
.video-preview-wrapper{position:relative;width:100%;aspect-ratio:494/310;flex-shrink:0;cursor:none}
.video-preview-box{width:100%;height:100%;overflow:hidden;position:relative;background:#000 !important}
/* Corner brackets */
.bracket{position:absolute;width:12px;height:12px;pointer-events:none}
.bracket::before,.bracket::after{content:'';position:absolute;background:var(--dimmer)}
.bracket.tl{top:-1px;left:-1px}.bracket.tl::before{top:0;left:0;width:12px;height:1px}.bracket.tl::after{top:0;left:0;width:1px;height:12px}
.bracket.tr{top:-1px;right:-1px}.bracket.tr::before{top:0;right:0;width:12px;height:1px}.bracket.tr::after{top:0;right:0;width:1px;height:12px}
.bracket.bl{bottom:-1px;left:-1px}.bracket.bl::before{bottom:0;left:0;width:12px;height:1px}.bracket.bl::after{bottom:0;left:0;width:1px;height:12px}
.bracket.br{bottom:-1px;right:-1px}.bracket.br::before{bottom:0;right:0;width:12px;height:1px}.bracket.br::after{bottom:0;right:0;width:1px;height:12px}

/* Play label — hidden by default, visible on hover only */
.slide-play-label{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:flex-end;justify-content:center;gap:0;cursor:none;z-index:6;opacity:0;transition:opacity .3s;padding-bottom:8px}
.video-preview-wrapper:hover .slide-play-label{opacity:1}
.play-dot{display:none}
.play-text{font-family:var(--sans);font-weight:500;font-size:14px;letter-spacing:0.02em;text-transform:none;color:var(--lemon)}

/* Project info top/bottom in center column */
.slide-top{display:flex;align-items:center;justify-content:space-between;gap:0.8rem}
.slide-top-type{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;color:var(--lemon);overflow:hidden;text-transform:uppercase}
.slide-top-type span{display:block;transform:translateY(0);transition:transform .5s var(--ease)}
.slide-top-icons{display:flex;gap:6px;opacity:0.5}
.slide-top-icons svg{width:16px;height:16px}
.slide-top-cat{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;color:var(--lemon);text-transform:uppercase}
.slide-bottom{display:flex;align-items:flex-end;justify-content:space-between}
.slide-bottom-left{display:flex;align-items:baseline;gap:0.5rem}
.slide-num{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;overflow:hidden}
.slide-num span{display:block;transition:transform .5s var(--ease)}
.slide-client{font-family:var(--sans);font-size:clamp(0.6rem,0.75vw,0.8rem);letter-spacing:0.02em;color:var(--lemon);overflow:hidden;text-transform:uppercase}
.slide-client span{display:block;transition:transform .5s var(--ease)}
.slide-total{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;color:var(--dimmer);overflow:hidden}

/* Adjacent project previews — 256×144 at viewport top/bottom center */
.adj-preview{position:fixed;left:50%;transform:translateX(-50%);width:256px;height:144px;z-index:200;overflow:hidden;pointer-events:none}
.adj-preview.is--top{top:0}
.adj-preview.is--bottom{bottom:0}
.adj-preview img{width:100%;height:100%;object-fit:cover}

/* ─── Video Hover Overlay ─────────────────────────────────── */
.video-hover-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s ease-out;z-index:7;pointer-events:none}
.video-preview-wrapper:hover .video-hover-overlay{opacity:1}
.video-hover-inner{display:flex;align-items:center;gap:0.5rem}
.text-dot{width:6px;height:6px;border-radius:50%;background:var(--lemon);animation:fadePulse .6s ease-in-out infinite alternate}
.video-hover-label{font-family:var(--sans);font-size:clamp(0.55rem,0.7vw,0.75rem);letter-spacing:0.1em;text-transform:uppercase;color:var(--lemon);font-weight:500}
@keyframes fadePulse{0%{opacity:.4}100%{opacity:1}}

/* ─── Video Player (Full-screen) ────────────────────────────── */
.player{position:fixed;inset:0;z-index:20000;background:var(--bg);opacity:0;pointer-events:none;transition:opacity .5s var(--ease);display:flex;flex-direction:column}
.player.is--active{opacity:1;pointer-events:all}
.player-top{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;flex-shrink:0}
.player-nav-text{font-family:var(--sans);font-size:clamp(0.6rem,0.7vw,0.75rem);letter-spacing:0.05em;text-transform:uppercase;cursor:none;color:var(--dimmer);transition:color .3s;overflow:hidden}
.player-nav-text:hover{color:var(--lemon)}
.player-nav-text span{display:block}
.player-info-text{font-family:var(--sans);font-size:clamp(0.6rem,0.7vw,0.75rem);letter-spacing:0.05em;text-transform:uppercase;cursor:none;color:var(--dimmer);transition:color .3s}
.player-info-text:hover{color:var(--lemon)}
.player-body{flex:1;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.player-video-block{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.player-video{width:100%;height:100%;object-fit:contain}
.player-bottom{display:flex;flex-direction:column;align-items:center;gap:0.4rem;padding:10px 20px 22px;flex-shrink:0}
.player-time{display:flex;align-items:center;gap:0.6rem;font-family:var(--mono);font-size:10px;color:var(--dimmer)}
.player-pause{font-family:var(--sans);font-size:clamp(0.6rem,0.7vw,0.75rem);letter-spacing:0.05em;text-transform:uppercase;cursor:none;color:var(--lemon);transition:opacity .3s}
.player-time-dot{width:4px;height:4px;border-radius:50%;background:var(--dimmer)}
.player-loop{width:5px;height:5px;border-radius:50%;background:var(--lemon);opacity:0.5;cursor:none;position:absolute;right:20px;bottom:20px}
.player-loop.is--active{opacity:1}

/* Player side navigation (project name overlay) */
.player-title{position:absolute;bottom:24px;left:20px;z-index:3}
.player-title-name{font-family:var(--serif);font-weight:200;font-size:clamp(1.2rem,2.2vw,2.4rem);letter-spacing:-0.02em;color:var(--lemon);line-height:1.15}
.player-title-name .il{font-family:var(--serif-i);font-style:italic}
.player-meta{position:absolute;bottom:26px;right:20px;text-align:right;z-index:3}
.player-meta-type{font-family:var(--mono);font-size:10px;color:var(--dimmer);letter-spacing:0.02em}
.player-meta-cat{font-family:var(--mono);font-size:10px;color:var(--dimmer);margin-top:3px;letter-spacing:0.02em}

/* ─── List View ─────────────────────────────────────────────── */
.list-view{position:absolute;inset:0;z-index:2;overflow-y:auto;overflow-x:hidden;padding-top:60px;display:none}
.list-view.is--active{display:block}
.list-view::-webkit-scrollbar{width:0}
.project-list{padding:0 20px}

.project-item{display:flex;flex-direction:column;cursor:none;position:relative;overflow:hidden}
.list-divider{height:0.5px;background:rgba(255,238,200,0.08);width:100%}
.project-grid{display:grid;grid-template-columns:1fr auto;align-items:center;padding:19px 10px 19px 20px;min-height:128px;gap:0}
.project-info-block{display:flex;flex-direction:column;gap:6px}
.proj-num-wrap{overflow:hidden}
.proj-num{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;color:var(--lemon)}
.proj-num.has--margin{margin-top:6px;margin-right:1px}
.name-block{display:flex;flex-direction:row;flex-wrap:wrap;gap:0 0.35em;margin-left:-1px}
.name-medium{font-family:var(--serif);font-weight:200;font-size:clamp(1rem,1.3vw,1.3rem);line-height:1.22;letter-spacing:-0.02em;color:var(--lemon)}
.name-medium .il{font-family:var(--serif-i);font-style:italic}
.proj-sub{font-family:var(--mono);font-size:10px;letter-spacing:-0.01em;color:var(--dimmer);text-transform:uppercase;margin-top:4px}

/* List video thumbnail */
.list-video-container{width:160px;height:90px;overflow:hidden;position:relative;flex-shrink:0}
.list-video-wrapper{width:100%;height:100%;clip-path:polygon(0 0,100% 0,100% 100%,0 100%);position:relative}
.list-video-img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;transition:transform .5s var(--ease)}
.list-video-el{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0;transition:opacity .4s}
.project-item:hover .list-video-img{transform:scale(1.05)}
.project-item:hover .list-video-el{opacity:1}

/* Background video on list hover (full viewport behind) */
.project-bg-video{position:fixed;inset:0;z-index:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .5s;pointer-events:none}

/* ─── Footer ────────────────────────────────────────────────── */
.site-footer{position:fixed;bottom:0;left:0;right:0;z-index:9999;padding:0 0 20px;display:flex;align-items:flex-end;justify-content:space-between;pointer-events:none}
.footer-left{display:flex;align-items:center;gap:9.5rem;pointer-events:all;padding-left:20px}
.footer-year{font-family:var(--sans);font-size:14px;color:var(--dimmer);letter-spacing:0.02em;display:none}
@media(min-width:768px){.footer-year{display:block}}
.footer-toggle{display:flex;align-items:center;gap:0}
.option-item{cursor:none;position:relative;overflow:hidden;height:1.2em}
.option-text{font-family:var(--sans);font-size:14px;color:var(--dimmer);letter-spacing:0.02em;text-transform:uppercase;transition:color .3s}
.option-item.is--active .option-text{color:var(--lemon)}
.option-item:hover .option-text{color:var(--lemon)}
.option-sep{font-family:var(--sans);font-size:14px;color:var(--dimmer);margin:0 0.3rem}

.footer-right{display:flex;align-items:flex-end;gap:3rem;pointer-events:all;padding-right:20px;width:540px;flex-shrink:0}
.footer-filters{display:flex;flex-direction:column;align-items:flex-start;gap:1px}
.filter-item{display:flex;align-items:center;gap:0.3rem;cursor:none}
.filter-item .dot{width:5px;height:5px;border-radius:50%;background:var(--lemon);opacity:0;transition:opacity .3s;flex-shrink:0}
.filter-item.is--active .dot{opacity:1}
.filter-label{font-family:var(--sans);font-size:14px;color:var(--dimmer);letter-spacing:0.02em;text-transform:uppercase;white-space:nowrap;transition:color .3s}
.filter-item.is--active .filter-label{color:var(--lemon)}
.filter-item:hover .filter-label{color:var(--lemon)}
.filter-count{font-family:var(--mono);font-size:0.8em;opacity:0.6;margin-left:0.15em}
.footer-end{display:flex;flex-direction:column;align-items:flex-end;gap:2px;margin-left:auto;align-self:end}
.footer-clock{font-family:var(--mono);font-size:10px;color:var(--dimmer);letter-spacing:0.02em;display:none}
@media(min-width:768px){.footer-clock{display:block}}
.footer-credits{font-family:var(--sans);font-size:14px;color:var(--dimmer);letter-spacing:0.02em;text-transform:uppercase;cursor:none;transition:color .3s}
.footer-credits:hover{color:var(--lemon)}

/* ─── Responsive ────────────────────────────────────────────── */
@media(max-width:767px){
  .slide-content{grid-template-columns:1fr;grid-template-rows:auto;padding:60px 20px;gap:1rem;align-content:center}
  .slide-name-left,.slide-name-right{font-size:clamp(1.8rem,8vw,2.8rem);text-align:center}
  .slide-center{height:auto;gap:1rem}
  .list-video-container{width:100px;height:56px}

/* ═══════ HELPERS ═══════ */
const padConfig = {
  left: 'BDEFHIJKLMNPRS', med: 'X', large: 'A',
  tinyNeg: 'CG', leftNeg: 'TY', largeNeg: 'W'
};

function italicizeTitle(title) {
  return title.split(' ').map(w => {
    if (!w) return w;
    const first = w[0].toUpperCase();
    const rest = w.slice(1);
    let style = '';
    if (padConfig.left.includes(first)) style = 'padding-left:0.4vw';
    else if (padConfig.med.includes(first)) style = 'padding-left:0.6vw';
    else if (padConfig.large.includes(first)) style = 'padding-left:0.9vw';
    else if (padConfig.tinyNeg.includes(first)) style = 'margin-left:-0.25vw';
    else if (padConfig.leftNeg.includes(first)) style = 'margin-left:-0.4vw';
    else if (padConfig.largeNeg.includes(first)) style = 'margin-left:-0.9vw';
    return `<span class="word" style="display:inline-block;margin-right:0.25em"><span class="il" style="${style}">${w[0]}</span>${rest}</span>`;
  }).join('');
}

function catLabel(c) {
  return {'tv-film':'TV & Film','commercial':'Commercial','editorial':'Editorial'}[c] || c;
}

function splitTitle(title) {
  const dashIdx = title.indexOf(' - ');
  if (dashIdx > 0) {
    return { left: title.slice(0, dashIdx), right: title.slice(dashIdx + 3) };
  }
  const words = title.split(' ');
  if (words.length <= 2) {
    return { left: words[0], right: words.slice(1).join(' ') || '' };
  }
  const mid = Math.ceil(words.length / 2);
  return { left: words.slice(0, mid).join(' '), right: words.slice(mid).join(' ') };
}

/* ═══════ GSAP OBSERVER — Scroll-Based Navigation ═══════ */
let observerInstance = null;

function initObserver() {
  if (observerInstance) { observerInstance.kill(); observerInstance = null; }
  if (typeof Observer === 'undefined' || currentView !== 'slider') return;

  observerInstance = Observer.create({
    type: 'wheel,touch,pointer',
    wheelSpeed: -1,
    onDown: () => goToSlide(currentSlide - 1),
    onUp: () => goToSlide(currentSlide + 1),
    tolerance: 10,
    preventDefault: true,
  });
}

function goToSlide(idx) {
  if (isAnimating) return;
  if (idx < 0 || idx >= filtered.length) return;
  if (idx === currentSlide) return;

  isAnimating = true;
  const dir = idx > currentSlide ? 1 : -1;
  const slides = document.querySelectorAll('.slide');
  const oldSlide = slides[currentSlide];
  const newSlide = slides[idx];

  if (!oldSlide || !newSlide) { isAnimating = false; return; }

  // Crossfade bg video
  updateBgVideo(idx);

  // Animate out old slide
  const tl = gsap.timeline({
    onComplete: () => {
      oldSlide.classList.remove('is--active');
      currentSlide = idx;
      isAnimating = false;
    }
  });

  // Make new slide visible but transparent
  newSlide.style.opacity = '0';
  newSlide.style.pointerEvents = 'none';
  newSlide.classList.add('is--active');

  const yOut = dir * -60;
  const yIn = dir * 60;

  // Animate old content out
  tl.to(oldSlide.querySelector('.slide-name-left'), { y: yOut, opacity: 0, duration: 0.5, ease: 'mainEase' }, 0)
    .to(oldSlide.querySelector('.slide-name-right'), { y: yOut, opacity: 0, duration: 0.5, ease: 'mainEase' }, 0.02)
    .to(oldSlide.querySelector('.slide-center'), { opacity: 0, duration: 0.35, ease: 'power2.out' }, 0)
    // Crossfade
    .to(oldSlide, { opacity: 0, duration: 0.3 }, 0.3)
    .to(newSlide, { opacity: 1, duration: 0.3 }, 0.3)
    // Animate new content in
    .fromTo(newSlide.querySelector('.slide-name-left'), { y: yIn, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'mainEase' }, 0.35)
    .fromTo(newSlide.querySelector('.slide-name-right'), { y: yIn, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: 'mainEase' }, 0.38)
    .fromTo(newSlide.querySelector('.slide-center'), { opacity: 0 }, { opacity: 1, duration: 0.5, ease: 'power2.out' }, 0.4)
    .set(newSlide, { pointerEvents: 'all' }, 0.5)
    .fromTo(newSlide.querySelector('.slide-top-type span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase' }, 0.4)
    .fromTo(newSlide.querySelector('.slide-num span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase' }, 0.45)
    .fromTo(newSlide.querySelector('.slide-client span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase' }, 0.5);
}

    wrapper.addEventListener('mouseenter', () => {

/* ═══════ BACKGROUND VIDEO ═══════ */
function updateBgVideo(idx) {
  const p = filtered[idx];
  if (!p) return;
  const nextIdx = bgActiveIdx === 1 ? 2 : 1;
  const nextEl = document.getElementById('bg-video-' + nextIdx);
  const prevEl = document.getElementById('bg-video-' + bgActiveIdx);
  nextEl.src = p.h;
  nextEl.play().catch(()=>{});
  nextEl.classList.add('is--active');
  prevEl.classList.remove('is--active');
  setTimeout(() => { prevEl.pause(); prevEl.src = ''; }, 600);
  bgActiveIdx = nextIdx;
}

/* ═══════ NAV WIPE TRANSITION (nav links only) ═══════ */
function doNavTransition(callback) {
  if (typeof gsap === 'undefined') { if (callback) callback(); return; }

  const blocks = document.querySelectorAll('.transition-block');
  if (!blocks.length) { if (callback) callback(); return; }

  const dur = 1.35;
  const tl = gsap.timeline();

  tl.fromTo(blocks, { height: '0%' }, {
    height: '100%', duration: dur * 0.5, ease: 'transitionEase', stagger: 0.03
  })
  .call(() => { if (callback) callback(); })
  .fromTo(blocks, { height: '100%' }, {
    height: '0%', duration: dur * 0.5, ease: 'transitionEase', stagger: 0.03
  }, '+=0.1');
}

/* ═══════ PLAYER ═══════ */
function openPlayer(idx) {
  const p = filtered[idx];
  if (!p) return;
  const player = document.getElementById('player');
  const vid = document.getElementById('player-video');
  document.getElementById('player-title-name').innerHTML = italicizeTitle(p.t);
  document.getElementById('player-meta-type').textContent = p.tp;
  document.getElementById('player-meta-cat').textContent = catLabel(p.cat);
  vid.src = p.f;
  vid.play().catch(()=>{});
  player.classList.add('is--active');
  document.getElementById('player-pause').textContent = 'pause';

  // Disable observer while player is open
  if (observerInstance) observerInstance.disable();

  vid.ontimeupdate = () => {
    document.getElementById('player-time-current').textContent = fmtTime(vid.currentTime);
    document.getElementById('player-time-total').textContent = fmtTime(vid.duration || 0);
  };
}

function closePlayer() {
  const player = document.getElementById('player');
  const vid = document.getElementById('player-video');
  vid.pause(); vid.src = '';
  player.classList.remove('is--active');

  // Re-enable observer
  if (observerInstance) observerInstance.enable();
}

function fmtTime(s) {
  if (isNaN(s)) return '00:00';
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return String(m).padStart(2,'0') + ':' + String(sec).padStart(2,'0');
}

document.getElementById('player-back').addEventListener('click', closePlayer);
document.getElementById('player-pause').addEventListener('click', () => {
  const vid = document.getElementById('player-video');
  const btn = document.getElementById('player-pause');
  if (vid.paused) { vid.play(); btn.textContent = 'pause'; }
  else { vid.pause(); btn.textContent = 'play'; }
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePlayer(); });

/* ═══════ VIEW TOGGLE ═══════ */
function setView(view) {
  currentView = view;
  const sv = document.getElementById('slider-view');
  const lv = document.getElementById('list-view');

  document.querySelectorAll('.option-item').forEach(b => {
    b.classList.toggle('is--active', b.dataset.view === view);
  });

  if (view === 'slider') {
    sv.classList.remove('is--hidden');
    lv.classList.remove('is--active');
    renderSlides();
    initPreviewHovers();
  } else {
    sv.classList.add('is--hidden');
    lv.classList.add('is--active');
    renderList();
    if (observerInstance) { observerInstance.kill(); observerInstance = null; }
  }
}

document.querySelectorAll('[data-view]').forEach(btn => {
  btn.addEventListener('click', () => setView(btn.dataset.view));
});

/* ═══════ FILTER ═══════ */
document.getElementById('filter-bar').addEventListener('click', e => {
  const item = e.target.closest('.filter-item');
  if (!item) return;
  document.querySelectorAll('.filter-item').forEach(f => f.classList.remove('is--active'));
  item.classList.add('is--active');
  currentFilter = item.dataset.filter;
  filtered = currentFilter === 'all' ? [...P] : P.filter(p => p.cat === currentFilter);

  if (currentView === 'slider') { renderSlides(); initPreviewHovers(); }
  else renderList();
});

  let cx = -100, cy = -100, tx = -100, ty = -100;
  document.addEventListener('mousemove', e => { tx = e.clientX; ty = e.clientY; });
  document.addEventListener('mouseleave', () => c.classList.add('is--hidden'));
  document.addEventListener('mouseenter', () => c.classList.remove('is--hidden'));

  function attachHovers() {
    document.querySelectorAll('a,button,.project-item,.filter-item,.option-item,.video-preview-wrapper,.nav-menu-link').forEach(el => {
      el.addEventListener('mouseenter', () => c.classList.add('is--big'));
      el.addEventListener('mouseleave', () => c.classList.remove('is--big'));
    });
  }
  const obs = new MutationObserver(attachHovers);
  obs.observe(document.body, { childList: true, subtree: true });
  attachHovers();

  (function tick() {
    cx += (tx - cx) * 0.15;
    cy += (ty - cy) * 0.15;
    c.style.transform = `translate(${cx - 5}px, ${cy - 5}px)`;
    requestAnimationFrame(tick);
  })();
})();

/* ═══════ PRELOADER (with corner thumbnail flashes) ═══════ */
(function runPreloader() {
  const pre = document.getElementById('preloader');
  const text = document.getElementById('preloader-text');
  const counter = document.getElementById('preloader-counter');
  const name = document.getElementById('preloader-name');
  const corners = ['corner-tl', 'corner-tr', 'corner-bl', 'corner-br'];
  let count = 0;
  let flashInterval = null;

  setTimeout(() => text.classList.add('is--reveal'), 200);

  // Start corner thumbnail flashes
  flashInterval = setInterval(() => {
    // Pick 1-2 random corners
    const numFlashes = Math.random() > 0.5 ? 2 : 1;
    const shuffled = corners.sort(() => Math.random() - 0.5);
    for (let i = 0; i < numFlashes; i++) {
      const cornerEl = document.getElementById(shuffled[i]);
      const randomProject = P[Math.floor(Math.random() * P.length)];
      const img = cornerEl.querySelector('img');
      img.src = randomProject.th;
      cornerEl.classList.add('is--flash');
      setTimeout(() => cornerEl.classList.remove('is--flash'), 350 + Math.random() * 150);
    }
  }, 350);

  const countInterval = setInterval(() => {
    count += Math.floor(Math.random() * 12) + 3;
    if (count > 100) count = 100;
    counter.textContent = String(count).padStart(3, '0');
    if (count >= 100) {
      clearInterval(countInterval);
      clearInterval(flashInterval);
      // Hide all corner flashes
      corners.forEach(id => document.getElementById(id).classList.remove('is--flash'));

      setTimeout(() => name.classList.add('is--reveal'), 200);
      setTimeout(() => {
        pre.classList.add('is--done');
        // Remove corner elements
        corners.forEach(id => {
          const el = document.getElementById(id);
          if (el) el.style.display = 'none';
        });
        setTimeout(() => {
          pre.style.display = 'none';
          initGSAP();
        }, 800);
      }, 1200);
    }
  }, 80);
})();

/* ═══════ GSAP INIT ═══════ */
function initGSAP() {
  if (typeof gsap === 'undefined') return;
  gsap.from('.navbar', { opacity: 0, y: -15, duration: 0.6, ease: 'mainEase', delay: 0.1 });
  gsap.from('.site-footer', { opacity: 0, y: 15, duration: 0.6, ease: 'mainEase', delay: 0.15 });
  gsap.from('.decor-rulers', { opacity: 0, duration: 1, delay: 0.3 });

  // Animate first slide in
  const firstSlide = document.querySelector('.slide.is--active');
  if (firstSlide) {
    gsap.fromTo(firstSlide.querySelector('.slide-name-left'), { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: 'mainEase', delay: 0.2 });
    gsap.fromTo(firstSlide.querySelector('.slide-name-right'), { y: 40, opacity: 0 }, { y: 0, opacity: 1, duration: 0.8, ease: 'mainEase', delay: 0.25 });
    gsap.fromTo(firstSlide.querySelector('.slide-center'), { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out', delay: 0.3 });
    gsap.fromTo(firstSlide.querySelector('.slide-top-type span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase', delay: 0.35 });
    gsap.fromTo(firstSlide.querySelector('.slide-num span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase', delay: 0.4 });
    gsap.fromTo(firstSlide.querySelector('.slide-client span'), { y: '100%' }, { y: '0%', duration: 0.5, ease: 'mainEase', delay: 0.45 });
  }
}

/* ═══════ SHUFFLE TEXT ═══════ */
const shuffleChars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
function shuffleText(el) {
  const orig = el.textContent;
  let iter = 0;
  const id = setInterval(() => {
    el.textContent = orig.split('').map((ch, i) => {
      if (i < iter) return orig[i];
      return ch === ' ' ? ' ' : shuffleChars[Math.floor(Math.random() * shuffleChars.length)];
    }).join('');
    if (iter >= orig.length) clearInterval(id);
    iter += 0.5;
  }, 35);
}
document.querySelectorAll('.nav-menu-link, .nav-menu-btn').forEach(el => {
  el.addEventListener('mouseenter', () => shuffleText(el));
});

/* ═══════ BOOT ═══════ */
renderSlides();
renderList();
initPreviewHovers();
</script>
